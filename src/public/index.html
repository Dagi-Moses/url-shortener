<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f8;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --border-strong: rgba(0,0,0,0.2);
      --text: #1a1a18;
      --muted: #6b6b68;
      --accent: #4f46e5;
      --accent-hover: #4338ca;
      --accent-light: #eef2ff;
      --danger: #dc2626;
      --danger-light: #fef2f2;
      --success: #16a34a;
      --success-light: #f0fdf4;
      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #141413;
        --surface: #1e1e1c;
        --border: rgba(255,255,255,0.1);
        --border-strong: rgba(255,255,255,0.2);
        --text: #f0efea;
        --muted: #888885;
        --accent: #818cf8;
        --accent-hover: #a5b4fc;
        --accent-light: #1e1b4b;
        --danger: #f87171;
        --danger-light: #2d1515;
        --success: #4ade80;
        --success-light: #14291f;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      font-size: 15px;
      line-height: 1.6;
    }

    .container { max-width: 680px; margin: 0 auto; }

    header { margin-bottom: 2.5rem; }
    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 svg { color: var(--accent); }
    header p { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card h2 { font-size: 14px; font-weight: 600; margin-bottom: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

    .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
    label { font-size: 13px; color: var(--muted); }

    input[type="url"], input[type="text"], input[type="datetime-local"] {
      height: 36px;
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 0 10px;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }

    .btn {
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius);
      border: 0.5px solid var(--border-strong);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: var(--text);
      transition: background 0.15s, color 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: var(--border); }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }
    .btn-primary:hover { background: var(--accent-hover); color: #fff; }
    .btn-danger { color: var(--danger); border-color: var(--danger); }
    .btn-danger:hover { background: var(--danger-light); }

    .form-actions { display: flex; align-items: flex-end; gap: 8px; }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 10px 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 100;
      max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success-light); color: var(--success); border: 0.5px solid var(--success); }
    .toast.error { background: var(--danger-light); color: var(--danger); border: 0.5px solid var(--danger); }

    .links-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .link-item {
      border-top: 0.5px solid var(--border);
      padding: 14px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }
    .link-item:first-child { border-top: none; padding-top: 0; }

    .link-slug {
      font-weight: 600;
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .link-slug:hover { text-decoration: underline; }
    .link-target {
      font-size: 13px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 380px;
    }
    .link-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-expired { background: var(--danger-light); color: var(--danger); }
    .badge-clicks { background: var(--accent-light); color: var(--accent); }

    .link-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 30px;
      height: 30px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 15px;
    }
    .icon-btn:hover { border-color: var(--border-strong); color: var(--text); background: var(--border); }
    .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

    .empty {
      text-align: center;
      padding: 2rem 0;
      color: var(--muted);
      font-size: 14px;
    }
    .empty svg { margin-bottom: 8px; opacity: 0.4; }

    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
    .stat-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }
    .stat-card .num { font-size: 22px; font-weight: 600; }
    .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      opacity: 0.5;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row { display: flex; justify-content: center; padding: 2rem 0; color: var(--muted); }

    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
      .stats { grid-template-columns: repeat(3, 1fr); }
      .link-target { max-width: 220px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
      URL Shortener
    </h1>
    <p>Create and manage short links</p>
  </header>

  <div class="card">
    <h2>Shorten a URL</h2>
    <div class="form-row">
      <div class="form-group" style="flex: 2; min-width: 200px;">
        <label for="target-url">Destination URL</label>
        <input type="url" id="target-url" placeholder="https://example.com/very/long/path" />
      </div>
      <div class="form-group">
        <label for="custom-slug">Custom slug <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="text" id="custom-slug" placeholder="my-link" maxlength="20" />
      </div>
      <div class="form-group">
        <label for="expires-at">Expires at <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input type="datetime-local" id="expires-at" />
      </div>
    </div>
    <div style="margin-top: 12px;">
      <button class="btn btn-primary" id="create-btn" onclick="createLink()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Create link
      </button>
    </div>
  </div>

  <div class="card">
    <div class="links-header">
      <h2 style="margin:0">Your links</h2>
      <button class="btn" onclick="loadLinks()" id="refresh-btn" aria-label="Refresh links">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>

    <div class="stats" id="stats" style="display:none">
      <div class="stat-card"><div class="num" id="stat-total">0</div><div class="lbl">Total links</div></div>
      <div class="stat-card"><div class="num" id="stat-clicks">0</div><div class="lbl">Total clicks</div></div>
      <div class="stat-card"><div class="num" id="stat-active">0</div><div class="lbl">Active links</div></div>
    </div>

    <div id="links-container">
      <div class="loading-row"><span class="spinner"></span></div>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script>
  const BASE = '';
  let toastTimer = null;

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (!btn) return;
    if (loading) {
      btn.dataset.orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span>';
      btn.disabled = true;
    } else {
      btn.innerHTML = btn.dataset.orig || btn.innerHTML;
      btn.disabled = false;
    }
  }

  async function createLink() {
    const url = document.getElementById('target-url').value.trim();
    const slug = document.getElementById('custom-slug').value.trim();
    const expiresAt = document.getElementById('expires-at').value;

    if (!url) { showToast('Please enter a destination URL', 'error'); return; }

    const body = { target_url: url };
    if (slug) body.slug = slug;
    if (expiresAt) body.expires_at = new Date(expiresAt).toISOString();

    setLoading('create-btn', true);
    try {
      const res = await fetch(`${BASE}/api/links`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to create link');

      showToast(`Link created: ${data.short_url}`);
      document.getElementById('target-url').value = '';
      document.getElementById('custom-slug').value = '';
      document.getElementById('expires-at').value = '';
      await loadLinks();
    } catch (err) {
      showToast(err.message, 'error');
    } finally {
      setLoading('create-btn', false);
    }
  }

  async function deleteLink(slug) {
    if (!confirm(`Delete /${slug}?`)) return;
    try {
      const res = await fetch(`${BASE}/api/links/${slug}`, { method: 'DELETE' });
      if (!res.ok) { const d = await res.json(); throw new Error(d.error); }
      showToast(`/${slug} deleted`);
      await loadLinks();
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  async function copyLink(url) {
    try {
      await navigator.clipboard.writeText(url);
      showToast('Copied to clipboard!');
    } catch {
      showToast('Could not copy', 'error');
    }
  }

  function formatDate(iso) {
    if (!iso) return null;
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function renderLinks(links) {
    const container = document.getElementById('links-container');
    if (!links.length) {
      container.innerHTML = `<div class="empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        <div>No links yet. Create your first one above.</div>
      </div>`;
      return;
    }

    const totalClicks = links.reduce((s, l) => s + l.click_count, 0);
    const activeCount = links.filter(l => !l.is_expired).length;

    document.getElementById('stat-total').textContent = links.length;
    document.getElementById('stat-clicks').textContent = totalClicks;
    document.getElementById('stat-active').textContent = activeCount;
    document.getElementById('stats').style.display = 'grid';

    container.innerHTML = links.map(link => {
      const expiredBadge = link.is_expired
        ? `<span class="badge badge-expired">Expired</span>` : '';
      const expiryInfo = link.expires_at && !link.is_expired
        ? `<span>Expires ${formatDate(link.expires_at)}</span>` : '';

      return `<div class="link-item">
        <div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <a class="link-slug" href="${link.short_url}" target="_blank" rel="noopener">
              /${link.slug}
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            </a>
            <span class="badge badge-clicks">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              ${link.click_count} click${link.click_count !== 1 ? 's' : ''}
            </span>
            ${expiredBadge}
          </div>
          <div class="link-target" title="${link.target_url}">${link.target_url}</div>
          <div class="link-meta">
            <span>Created ${formatDate(link.created_at)}</span>
            ${expiryInfo}
          </div>
        </div>
        <div class="link-actions">
          <button class="icon-btn" title="Copy short URL" onclick="copyLink('${link.short_url}')" aria-label="Copy short URL for /${link.slug}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
          <button class="icon-btn danger" title="Delete link" onclick="deleteLink('${link.slug}')" aria-label="Delete /${link.slug}">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>
      </div>`;
    }).join('');
  }

  async function loadLinks() {
    setLoading('refresh-btn', true);
    try {
      const res = await fetch(`${BASE}/api/links?limit=100`);
      if (!res.ok) throw new Error('Failed to load links');
      const data = await res.json();
      renderLinks(data.links);
    } catch (err) {
      document.getElementById('links-container').innerHTML =
        `<div class="empty" style="color:var(--danger)">Could not load links. Is the API running?</div>`;
    } finally {
      setLoading('refresh-btn', false);
    }
  }

  document.getElementById('target-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') createLink();
  });

  loadLinks();
</script>
</body>
</html>
